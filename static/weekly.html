<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Steelworks Manager - Weekly Notes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/css/site.css" rel="stylesheet" type="text/css" />
    <link href="/css/common.css" rel="stylesheet" type="text/css" />
    <script src="/js/jquery-1.11.3.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>

    <style>
        body { padding-top: 20px; }
        .week-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .board-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 20px;
        }
        .day-column {
            flex: 1;
            min-width: 250px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
        }
        .day-header {
            background: #0080FF;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            border-radius: 5px 5px 0 0;
        }
        .day-header.weekend {
            background: #6c757d;
        }
        
        .day-note {
            padding: 10px;
            background: #fff3cd;
            border-bottom: 1px solid #ddd;
            min-height: 60px;
            cursor: pointer;
        }
        .day-note:hover {
            background: #ffeeba;
        }
        .note-title { font-size: 11px; color: #856404; font-weight: bold; margin-bottom: 5px; }
        
        .day-plans {
            padding: 10px;
            flex: 1;
            overflow-y: auto;
        }
        
        .plan-card {
            background: #fff;
            border: 1px solid #ccc;
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 3px;
            border-left: 4px solid #28a745;
        }
        .plan-card .emp-name { font-weight: bold; font-size: 13px; color: #333; }
        .plan-card .job-info { font-size: 12px; color: #555; }
        
        .btn-add-plan {
            width: 100%;
            margin-top: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation Menu -->
        <div class="nav-menu" id="main-nav"></div>

        <div class="week-header">
            <button class="btn btn-default" onclick="changeMonth(-1)">◀ Previous Month</button>
            <h2 id="week-title" style="margin:0;">Loading...</h2>
            <div>
                <button class="btn btn-default" onclick="changeMonth(1)">Next Month ▶</button>
                <button class="btn btn-info" onclick="changeMonth(0)">This Month</button>
                <input type="date" id="jump-date" class="form-control" style="display:inline-block; width:auto; margin-left:10px;" onchange="jumpToDate(this.value)" title="Jump to Date">
                <button class="btn btn-warning" onclick="loadRandomData('weekly')" style="margin-left:5px;" title="Auto-load random past data">🎲 Test Data</button>
            </div>
        </div>
        <p>Review and assign daily notes and production plans by Month. <span class="dev-hint" style="display:none; color:#888; font-size:12px;">[DB: tb_week_notes, tb_production_plan]</span></p>

        <div id="board" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px;">
            <!-- Monthly Calendar Grid generated by JS -->
        </div>
    </div>

    <!-- Note Edit Modal -->
    <div id="noteModal" class="modal fade" role="dialog">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header" style="background-color: #f0ad4e; color: white;">
            <button type="button" class="close" data-dismiss="modal">&times;</button>
            <h4 class="modal-title">Edit Daily Note</h4>
          </div>
          <div class="modal-body">
            <input type="hidden" id="note_date">
            <div class="form-group">
                <label>Note 1</label>
                <textarea id="note_text" class="form-control" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>Note 2 (Optional)</label>
                <textarea id="note2_text" class="form-control" rows="2"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-warning" onclick="saveNote()">Save Note</button>
            <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Plan Assign Modal -->
    <div id="planModal" class="modal fade" role="dialog">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header" style="background-color: #5cb85c; color: white;">
            <button type="button" class="close" data-dismiss="modal">&times;</button>
            <h4 class="modal-title">Assign Production Plan</h4>
          </div>
          <div class="modal-body">
            <input type="hidden" id="plan_date">
            
            <div class="form-group">
                <label>Employee</label>
                <select id="plan_emp" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>Job Selection</label>
                <select id="plan_job" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>Lot Number</label>
                <input type="number" id="plan_lot" class="form-control" value="1">
            </div>
            <div class="form-group">
                <label>Priority</label>
                <input type="number" id="plan_priority" class="form-control" value="1">
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-success" onclick="savePlan()">Assign Task</button>
            <button type="button" class="btn btn-default" data-dismiss="modal">Cancel</button>
          </div>
        </div>
      </div>
    </div>

    <script>
        let currentStartDate = new Date("2021-11-26"); // Default historical date containing notes
        let rightLevel = 1;
        let jobOptions = [];
        let empOptions = [];

        document.addEventListener("DOMContentLoaded", function() {
            const storedLvl = localStorage.getItem('right_level');
            if (storedLvl !== null) rightLevel = parseInt(storedLvl);

            fetchOptions();
            renderMonth();

            fetch('/api/config/dev_features')
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success' && data.dev_hints) {
                        document.querySelectorAll('.dev-hint').forEach(h => h.style.display = 'inline-block');
                    }
                });
        });

        function fetchOptions() {
            fetch('/api/schedule/job-options').then(res=>res.json()).then(data => {
                if(data.status === 'success') jobOptions = data.data;
            });
            fetch('/api/employees').then(res => res.json()).then(data => {
                if(data && data.status === 'success') empOptions = data.data;
            });
        }

        function changeMonth(offset) {
            if(offset === 0) {
                currentStartDate = new Date("2021-11-26"); // Reset to historical target or today
            } else {
                currentStartDate.setMonth(currentStartDate.getMonth() + offset);
            }
            renderMonth();
        }

        function jumpToDate(dateStr) {
            if(!dateStr) return;
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return;
            currentStartDate = d;
            document.getElementById('jump-date').value = dateStr;
            renderMonth();
        }

        function loadRandomData(type) {
            fetch('/api/dev/random-date?type=' + type)
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success' && data.date) {
                        jumpToDate(data.date);
                    } else {
                        alert("No past data found.");
                    }
                });
        }

        function formatDate(d) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function renderMonth() {
            const year = currentStartDate.getFullYear();
            const month = currentStartDate.getMonth();
            
            // Header: Month Title
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            document.getElementById('week-title').innerText = `${monthNames[month]} ${year}`;

            // Calculate start and end of month
            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);

            // Align to start from the Monday before or on the 1st
            const startDayOfWeek = firstDayOfMonth.getDay() || 7; // 1 (Mon) - 7 (Sun)
            const calendarStart = new Date(firstDayOfMonth);
            calendarStart.setDate(calendarStart.getDate() - startDayOfWeek + 1);

            // Align to end on the Sunday after or on the last day
            const endDayOfWeek = lastDayOfMonth.getDay() || 7;
            const calendarEnd = new Date(lastDayOfMonth);
            calendarEnd.setDate(calendarEnd.getDate() + (7 - endDayOfWeek));

            const startStr = formatDate(calendarStart);
            const endStr = formatDate(calendarEnd);

            const board = document.getElementById('board');
            board.innerHTML = '<h4>Loading Monthly Schedule...</h4>';

            fetch(`/api/schedule/weekly?start_date=${startStr}&end_date=${endStr}`)
                .then(res => res.json())
                .then(data => {
                    if(data.status !== 'success') return;
                    
                    board.innerHTML = '';
                    
                    // Add Weekday Headers
                    const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
                    days.forEach(day => {
                        const dayHeader = document.createElement('div');
                        dayHeader.style.fontWeight = 'bold';
                        dayHeader.style.textAlign = 'center';
                        dayHeader.style.padding = '5px';
                        dayHeader.style.background = '#0080FF';
                        dayHeader.style.color = '#fff';
                        dayHeader.style.borderRadius = '3px';
                        dayHeader.innerText = day;
                        board.appendChild(dayHeader);
                    });

                    // Loop through calendar dates
                    let tempDate = new Date(calendarStart);
                    while (tempDate <= calendarEnd) {
                        const curStr = formatDate(tempDate);
                        const isWeekend = (tempDate.getDay() === 0 || tempDate.getDay() === 6);
                        const isCurrentMonth = tempDate.getMonth() === month;
                        
                        const notes = data.data.notes[curStr] || {note: '', note2: ''};
                        const plans = data.data.plans[curStr] || [];
                        
                        let plansHtml = plans.map(p => `
                            <div class="plan-card" style="padding: 4px; margin-bottom: 4px; border-left-width: 3px; font-size: 11px;">
                                <div class="emp-name" style="font-size: 11px;">${p.firstname} ${p.surname.charAt(0)}.</div>
                                <div class="job-info" style="font-size: 10px;">Job #${p.job_number} (L${p.lot})</div>
                            </div>
                        `).join('');

                        let noteHtml = (notes.note || notes.note2) 
                            ? `<b style="font-size: 11px; color: #856404;">${notes.note}</b>`
                            : ``;

                        const dayBox = document.createElement('div');
                        dayBox.className = 'day-column';
                        dayBox.style.minHeight = '120px';
                        dayBox.style.background = isCurrentMonth ? '#ffffff' : '#f1f1f1';
                        dayBox.style.opacity = isCurrentMonth ? '1.0' : '0.6';
                        dayBox.style.border = '1px solid #ddd';
                        dayBox.style.borderRadius = '4px';
                        dayBox.style.display = 'flex';
                        dayBox.style.flexDirection = 'column';

                        dayBox.innerHTML = `
                            <div class="day-header" style="background: ${isWeekend ? '#6c757d' : '#0080FF'}; font-size: 11px; padding: 4px; color: white;">
                                ${tempDate.getDate()}
                            </div>
                            <div class="day-note" style="padding: 4px; min-height: auto; cursor: pointer; flex-shrink: 0;" onclick="openNoteModal('${curStr}', \`${notes.note.replace(/"/g, '&quot;')}\`, \`${notes.note2.replace(/"/g, '&quot;')}\`)">
                                ${noteHtml ? `<div class="note-title" style="margin-bottom: 2px;">Note ✏️</div>` : '<div style="font-size: 10px; color: #ccc;">+ Note</div>'}
                                <div style="font-size: 10px; max-height: 24px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${noteHtml}</div>
                            </div>
                            <div class="day-plans" style="padding: 4px; flex-grow: 1; overflow-y: auto;">
                                ${plansHtml}
                                ${rightLevel >= 5 && isCurrentMonth ? `<button class="btn btn-default btn-block" style="padding: 1px 3px; font-size: 9px; margin-top: 4px;" onclick="openPlanModal('${curStr}')">+ Job</button>` : ''}
                            </div>
                        `;
                        
                        board.appendChild(dayBox);
                        tempDate.setDate(tempDate.getDate() + 1);
                    }
                });
        }

        function openNoteModal(dateStr, note, note2) {
            if (rightLevel < 5) {
                alert("Only Supervisors and Admins can edit notes.");
                return;
            }
            document.getElementById('note_date').value = dateStr;
            document.getElementById('note_text').value = note;
            document.getElementById('note2_text').value = note2;
            $('#noteModal').modal('show');
        }

        function saveNote() {
            const dateStr = document.getElementById('note_date').value;
            const n1 = document.getElementById('note_text').value;
            const n2 = document.getElementById('note2_text').value;

            fetch('/api/schedule/notes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ date: dateStr, note: n1, note2: n2 })
            }).then(res=>res.json()).then(data=>{
                if(data.status==='success'){
                    $('#noteModal').modal('hide');
                    renderMonth();
                } else alert(data.message);
            });
        }

        function openPlanModal(dateStr) {
            document.getElementById('plan_date').value = dateStr;
            
            // Populate select options
            const jSel = document.getElementById('plan_job');
            jSel.innerHTML = jobOptions.map(j => `<option value="${j.job_number}">Job #${j.job_number} - ${j.company_name}</option>`).join('');
            
            const eSel = document.getElementById('plan_emp');
            if(empOptions && empOptions.length > 0) {
                eSel.innerHTML = empOptions.map(e => `<option value="${e.id}">${e.firstname} ${e.surname}</option>`).join('');
            } else {
                eSel.innerHTML = `<option value="123">Test Employee (ID:123)</option>`;
            }

            $('#planModal').modal('show');
        }

        function savePlan() {
            const payload = {
                date: document.getElementById('plan_date').value,
                employee_id: parseInt(document.getElementById('plan_emp').value) || 123,
                job_number: parseInt(document.getElementById('plan_job').value),
                lot: parseInt(document.getElementById('plan_lot').value),
                priority: parseInt(document.getElementById('plan_priority').value)
            };

            fetch('/api/schedule/plan', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            }).then(res=>res.json()).then(data=>{
                if(data.status==='success'){
                    $('#planModal').modal('hide');
                    renderMonth();
                } else alert(data.message);
            });
        }
    </script>
<script src="/js/nav.js"></script>
</body>
</html>
