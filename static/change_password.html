<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Steelworks Manager - Change Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/css/site.css" rel="stylesheet" type="text/css" />
    <style>
        body { padding-top: 50px; background-color: #f8f9fa; }
        .login-container { max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-container">
            <h3 class="text-center mb-4">Change Password</h3>
            <p class="text-muted text-center">You are using the default password. Please choose a new, secure password.</p>
            <div id="error-msg" class="alert alert-danger" style="display:none;"></div>
            <div id="success-msg" class="alert alert-success" style="display:none;"></div>
            
            <form id="change-pwd-form">
                <div class="form-group">
                    <label for="new_password">New Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="new_password" required minlength="8" placeholder="Minimum 8 characters">
                        <span class="input-group-btn">
                            <button class="btn btn-default" type="button" id="toggleNewPassword">Show</button>
                        </span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="confirm_password" required minlength="8">
                        <span class="input-group-btn">
                            <button class="btn btn-default" type="button" id="toggleConfirmPassword">Show</button>
                        </span>
                    </div>
                </div>
                <button type="submit" class="btn btn-warning btn-block">Change Password</button>
            </form>
            <div class="text-center mt-3">
                <a href="/login.html">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const tempToken = localStorage.getItem('temp_token');
        if (!tempToken) {
            window.location.href = '/login.html';
        }

        document.getElementById('toggleNewPassword').addEventListener('click', function() {
            const pwd = document.getElementById('new_password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                this.innerText = 'Hide';
            } else {
                pwd.type = 'password';
                this.innerText = 'Show';
            }
        });

        document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
            const pwd = document.getElementById('confirm_password');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                this.innerText = 'Hide';
            } else {
                pwd.type = 'password';
                this.innerText = 'Show';
            }
        });

        document.getElementById('change-pwd-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const newPwd = document.getElementById('new_password').value;
            const confirmPwd = document.getElementById('confirm_password').value;

            if (newPwd !== confirmPwd) {
                document.getElementById('error-msg').innerText = "Passwords do not match.";
                document.getElementById('error-msg').style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/auth/change_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ temp_token: tempToken, new_password: newPwd })
                });

                const result = await response.json();
                
                if (response.ok && result.status === 'success') {
                    document.getElementById('error-msg').style.display = 'none';
                    document.getElementById('success-msg').innerText = "Password changed successfully! Redirecting...";
                    document.getElementById('success-msg').style.display = 'block';
                    
                    localStorage.removeItem('temp_token');
                    if (result.right_level >= 10) {
                        localStorage.setItem('admin_token', result.token);
                        localStorage.setItem('right_level', result.right_level);
                        setTimeout(() => window.location.href = '/admin.html', 1500);
                    } else {
                        setTimeout(() => window.location.href = '/login.html', 1500);
                    }
                } else {
                    document.getElementById('error-msg').innerText = result.detail || "Failed to change password.";
                    document.getElementById('error-msg').style.display = 'block';
                }
            } catch (err) {
                document.getElementById('error-msg').innerText = "Network error. Please try again.";
                document.getElementById('error-msg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
