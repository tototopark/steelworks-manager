<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Steelworks Manager - Whiteboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="/css/site.css" rel="stylesheet" type="text/css" />
    <link href="/css/common.css" rel="stylesheet" type="text/css" />
    <script src="/js/jquery-1.11.3.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>

    <style>
        body { padding-top: 20px; }
        .whiteboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .board-card {
            border: 2px solid #333;
            border-radius: 8px;
            padding: 15px;
            background: #fff;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.1);
            position: relative;
        }
        
        .board-card h4 {
            margin-top: 0;
            border-bottom: 1px solid #ccc;
            padding-bottom: 10px;
            color: #d9534f;
            font-weight: bold;
        }
        
        .task-item {
            background: #fdfd96;
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 3px;
            border-left: 4px solid #f39c12;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation Menu -->
        <div class="nav-menu" id="main-nav"></div>

        <div class="row">
            <div class="col-md-6">
                <h2>Workshop Whiteboard</h2>
                <p>Live view of staff assignments and current tasks.</p>
            </div>
            <div class="col-md-6 text-right" style="padding-top: 20px;">
                <input type="date" id="jump-date" class="form-control" style="display:inline-block; width:150px;" onchange="fetchWhiteboard(this.value)" title="Search Past Tasks">
                <button class="btn btn-warning" onclick="loadRandomData()" style="margin-left:5px;" title="Auto-load random past data">🎲 Test Data</button>
                <button class="btn btn-info" onclick="document.getElementById('jump-date').value=''; fetchWhiteboard();">Today</button>
            </div>
        </div>

        <div class="whiteboard-grid" id="whiteboard-container">
            <!-- Cards will be injected here -->
            <div style="grid-column: 1 / -1; text-align: center; padding: 50px;">
                Loading whiteboard data...
            </div>
        </div>
    </div>

    <!-- Edit Task Modal -->
    <div class="modal fade" id="editTaskModal" tabindex="-1" role="dialog">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header">
            <h4 class="modal-title">Edit Task</h4>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-t-id">
            <input type="hidden" id="edit-t-emp-id">
            <div class="form-group">
                <label>Site</label>
                <input type="text" id="edit-t-site" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Task Instruction</label>
                <textarea id="edit-t-task" class="form-control" rows="3" required></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
            <button type="button" class="btn btn-primary" onclick="saveTaskEdit()">Save changes</button>
          </div>
        </div>
      </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const defaultDate = "2019-09-17";
            document.getElementById('jump-date').value = defaultDate;
            fetchWhiteboard(defaultDate);
        });

        function loadRandomData() {
            fetch('/api/dev/random-date?type=whiteboard')
                .then(res => res.json())
                .then(data => {
                    if(data.status === 'success' && data.date) {
                        document.getElementById('jump-date').value = data.date;
                        fetchWhiteboard(data.date);
                    } else {
                        alert("No past data found.");
                    }
                });
        }

        function fetchWhiteboard(dateStr = null) {
            // Fetch tasks first, then employees
            let url = '/api/tasks/active';
            if (dateStr) {
                url += '?date=' + encodeURIComponent(dateStr);
            }
            
            fetch(url)
                .then(res => res.json())
                .then(taskData => {
                    const tasks = taskData.status === "success" ? taskData.data : [];
                    
                    return fetch('/api/employees')
                        .then(response => response.json())
                        .then(data => {
                            const container = document.getElementById('whiteboard-container');
                            container.innerHTML = '';
                            
                            if(data.status === "success" && data.data.length > 0) {
                                data.data.forEach(emp => {
                                    // Show employees who have right_level 1, 2, 5, 6, 12, or have tasks assigned
                                    const empTasks = tasks.filter(t => t.employee === emp.id);
                                    if(emp.right_level === 1 || emp.right_level === 2 || emp.right_level === 12 || emp.right_level === 5 || emp.right_level === 6 || empTasks.length > 0) {
                                        let tasksHtml = '';
                                        
                                        if (empTasks.length > 0) {
                                            empTasks.forEach(t => {
                                                const tJson = JSON.stringify(t).replace(/'/g, "&apos;");
                                                tasksHtml += `
                                                    <div class="task-item">
                                                        <div><strong>Site:</strong> ${t.site || 'N/A'}</div>
                                                        <div><strong>Task:</strong> ${t.task}</div>
                                                        <div style="margin-top:5px; text-align:right;">
                                                            <button class="btn btn-xs btn-warning" onclick='openTaskEditModal(${tJson})'>Edit</button>
                                                            <button class="btn btn-xs btn-danger" onclick="deleteTask(${t.id})">Del</button>
                                                        </div>
                                                    </div>`;
                                            });
                                        } else {
                                            tasksHtml = '<div style="font-size:12px; color:#aaa;">No active tasks</div>';
                                        }

                                        const card = document.createElement('div');
                                        card.className = 'board-card';
                                        card.innerHTML = `
                                            <h4><i class="fa fa-user"></i> ${emp.firstname} ${emp.surname}</h4>
                                            <div style="font-size:12px; color:#777; margin-bottom:10px;">
                                                Role: ${emp.role || 'Worker'} | Bay: ${emp.bay || 'N/A'}
                                            </div>
                                            <div class="task-list">
                                                ${tasksHtml}
                                            </div>
                                        `;
                                        container.appendChild(card);
                                    }
                                });
                            } else {
                                container.innerHTML = '<p>No staff available for the whiteboard.</p>';
                            }
                        });
                })
                .catch(error => {
                    console.error('Error fetching whiteboard:', error);
                    document.getElementById('whiteboard-container').innerHTML = '<p style="color:red;">Error loading whiteboard data.</p>';
                });
        }

        function openTaskEditModal(t) {
            document.getElementById('edit-t-id').value = t.id;
            document.getElementById('edit-t-emp-id').value = t.employee;
            document.getElementById('edit-t-site').value = t.site || '';
            document.getElementById('edit-t-task').value = t.task || '';
            $('#editTaskModal').modal('show');
        }

        function saveTaskEdit() {
            const taskId = document.getElementById('edit-t-id').value;
            const payload = {
                employee_id: parseInt(document.getElementById('edit-t-emp-id').value),
                site: document.getElementById('edit-t-site').value,
                task_instruction: document.getElementById('edit-t-task').value
            };

            fetch(`/api/tasks/${taskId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    $('#editTaskModal').modal('hide');
                    fetchWhiteboard();
                } else {
                    alert('Error: ' + data.detail);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Error updating task');
            });
        }

        function deleteTask(taskId) {
            if(!confirm("Are you sure you want to delete this task?")) return;
            fetch(`/api/tasks/${taskId}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    fetchWhiteboard();
                } else {
                    alert('Error: ' + data.detail);
                }
            })
            .catch(err => {
                console.error(err);
                alert('Error deleting task');
            });
        }
    </script>
<script src="/js/nav.js"></script>
</body>
</html>
